<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DropSeed - BIP39 Seed Builder</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <div class="logo">
        <div class="logo-name">Drop<span>Seed</span></div>
        <div class="logo-tag">BIP39 BUILDER</div>
      </div>
      <div class="offline-badge">
        <span class="status-dot"></span>100% OFFLINE | NO NETWORK CALLS
      </div>
    </header>

    <div class="mode-switch-bar">
      <button class="mode-btn" data-mode="12">12-WORD</button>
      <button class="mode-btn active" data-mode="24">24-WORD</button>
    </div>

    <div class="main">
      <div class="pool-panel">
        <div class="panel-header">
          <div class="panel-label">Word Pool · 2048 words</div>
          <div class="search-wrap">
            <span class="search-icon">⌕</span>
            <input
              type="text"
              class="search-input"
              id="searchInput"
              placeholder="search word or #index..."
              autocomplete="off"
            />
          </div>
          <div class="result-count" id="resultCount">
            <span>2048</span> words
          </div>
        </div>
        <div class="cat-tabs" id="catTabsContainer"></div>
        <div class="word-pool" id="wordPool"></div>
      </div>

      <div class="builder-panel">
        <div class="rhythm-bar" id="rhythmBar"></div>
        <div class="slots-wrap">
          <div class="panel-label" id="slotsLabel" style="margin-bottom: 10px">
            Drag or type words into slots (0 of 23) · click slot to type
          </div>
          <div class="slots-grid" id="slotsGrid"></div>
          <div
            class="panel-label"
            id="lastWordLabel"
            style="margin-bottom: 10px; margin-top: 4px"
          >
            Last word · Checksum-derived (choose candidate)
          </div>
          <div id="slotLastWrap">
            <div class="slot slot-24" id="lastSlot">
              <div class="slot-num" id="lastSlotNum">24</div>
              <div class="slot-empty-hint">awaiting...</div>
            </div>
          </div>
        </div>
        <div class="progress-section">
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="progressFill"></div>
          </div>
          <div class="progress-text">
            <span id="filledCount">0</span>/<span id="totalSlotsCount">23</span>
            words placed
          </div>
        </div>
        <div class="candidate-section">
          <div class="candidate-label" id="candidateLabel"></div>

          <div class="candidates-row" id="candidatesRow"></div>
        </div>
        <div class="bit-strip-section">
          <div class="bit-strip-label">entropy strip · live</div>
          <div class="bit-strip" id="bitStrip"></div>
        </div>
        <div class="output-section" id="outputSection">
          <div class="output-label">Complete seed phrase</div>
          <div class="seed-phrase" id="seedOutput"></div>
          <div class="output-actions">
            <button class="btn btn-copy" id="copyBtn">Copy Seed</button
            ><button class="btn btn-reset" id="resetBtn">Reset Builder</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import {
        WORDLIST,
        CAT_NOUNS,
        CAT_VERBS,
        CAT_ADJ,
        CAT_SPECIALS,
        CAT_DETERMINERS,
        CAT_PREPOSITIONS,
        CAT_NUMBERS,
        CAT_PLURALS,
        CAT_VERBPRESENT,
        CAT_ADVERBS,
        CAT_VERBSPAST,
        RHYTHM,
      } from "./wordList.js";

      function getCategory(word) {
        if (CAT_NOUNS.has(word)) return "noun";
        if (CAT_VERBS.has(word)) return "verb";
        if (CAT_ADJ.has(word)) return "adj";
        if (CAT_SPECIALS.has(word)) return "specials";
        if (CAT_DETERMINERS.has(word)) return "determiner";
        if (CAT_PREPOSITIONS.has(word)) return "preposition";
        if (CAT_NUMBERS.has(word)) return "number";
        if (CAT_VERBPRESENT.has(word)) return "verbpresent";
        if (CAT_ADVERBS.has(word)) return "adverb";
        if (CAT_VERBSPAST.has(word)) return "verbpast";
        if (CAT_PLURALS.has(word)) return "plural";
        return "other";
      }
      function indexToBits(idx) {
        return idx.toString(2).padStart(11, "0");
      }
      function bitsToBytes(bitStr) {
        let bytes = [];
        for (let i = 0; i < bitStr.length; i += 8)
          bytes.push(parseInt(bitStr.slice(i, i + 8), 2));
        return new Uint8Array(bytes);
      }
      async function sha256(bytes) {
        return new Uint8Array(await crypto.subtle.digest("SHA-256", bytes));
      }

      let currentMode = "24";
      let slots = [];
      let lastWord = null;
      let typingSlot = null;
      let dragWord = null;
      let catFilter = "all";
      let poolPage = 0;

      function getFreeSlotCount() {
        return currentMode === "12" ? 11 : 23;
      }

      function getTotalWordCount() {
        return currentMode === "12" ? 12 : 24;
      }

      function getChecksumBits() {
        return currentMode === "12" ? 4 : 8;
      }

      function getTailEntropyBits() {
        return currentMode === "12" ? 7 : 3;
      }

      function resetSlots() {
        slots = new Array(getFreeSlotCount()).fill(null);
        lastWord = null;
        typingSlot = null;
      }

      let _cachedEntropyKey = null;
      let _cachedCandidates = null;

      async function computeLastWordCandidates() {
        const freeCount = getFreeSlotCount();
        const filled = slots.filter((s) => s !== null).length;
        if (filled !== freeCount) {
          _cachedEntropyKey = null;
          return [];
        }

        const key =
          currentMode + ":" + slots.map((s) => (s ? s.index : -1)).join(",");
        if (key === _cachedEntropyKey) return _cachedCandidates;
        _cachedEntropyKey = key;

        let entropyBits = "";
        for (let i = 0; i < freeCount; i++) {
          entropyBits += slots[i] ? slots[i].bits : "00000000000";
        }

        const tailLen = getTailEntropyBits();
        const checksumLen = getChecksumBits();
        const maxTail = 1 << tailLen;
        const candidates = [];

        for (let tail = 0; tail < maxTail; tail++) {
          const tailBits = tail.toString(2).padStart(tailLen, "0");
          const fullEntropyStr = entropyBits + tailBits;
          const entropyBytes = bitsToBytes(fullEntropyStr);
          const hash = await sha256(entropyBytes);

          let checksumBits = "";
          let bitsNeeded = checksumLen;
          let byteIndex = 0;

          while (bitsNeeded > 0 && byteIndex < hash.length) {
            const byteBits = hash[byteIndex].toString(2).padStart(8, "0");
            const take = Math.min(bitsNeeded, 8);
            checksumBits += byteBits.slice(0, take);
            bitsNeeded -= take;
            byteIndex++;
          }

          const lastWordBits = tailBits + checksumBits;
          const idx = parseInt(lastWordBits, 2);

          if (idx < WORDLIST.length) {
            candidates.push({
              bits: lastWordBits,
              index: idx,
              word: WORDLIST[idx],
              tailBits,
              checksumBits,
            });
          }
        }

        candidates.sort((a, b) => a.index - b.index);
        _cachedCandidates = candidates;
        return candidates;
      }

      function renderRhythmBar() {
        const bar = document.getElementById("rhythmBar");
        bar.innerHTML = `<div class="rhythm-label">story pattern -></div>`;
        const filled = slots.filter(Boolean).length;
        const targetLen = getFreeSlotCount();
        let pattern = [];
        if (RHYTHM && RHYTHM.length >= targetLen)
          pattern = RHYTHM.slice(0, targetLen);
        else {
          const fallback = [
            "noun",
            "verb",
            "adj",
            "prep",
            "adv",
            "noun",
            "verb",
            "adj",
            "det",
            "plural",
            "other",
          ];
          for (let i = 0; i < targetLen; i++)
            pattern.push(fallback[i % fallback.length]);
        }
        pattern.forEach((cat, i) => {
          if (i > 0) {
            const sep = document.createElement("span");
            sep.className = "rhythm-sep";
            sep.textContent = "·";
            bar.appendChild(sep);
          }
          const tok = document.createElement("div");
          tok.className = `rhythm-token ${cat}${i === filled ? " active" : ""}`;
          tok.textContent = cat === "other" ? "word" : cat;
          bar.appendChild(tok);
        });
      }

      function updateUILabels(candidates) {
        const free = getFreeSlotCount();
        document.getElementById("slotsLabel").innerHTML =
          `Drag or type words into slots ( ${slots.filter(Boolean).length} of ${free} ) · click slot to type`;
        document.getElementById("totalSlotsCount").innerText = free;
        document.getElementById("lastSlotNum").innerText = getTotalWordCount();
        const lastLabel =
          currentMode === "12"
            ? " Word 12 · Checksum-derived (choose one of 128)"
            : " Word 24 · Checksum-derived (choose one of 8)";
        document.getElementById("lastWordLabel").innerText = lastLabel;
        const count = candidates ? candidates.length : 0;
        const expected = currentMode === "12" ? 128 : 8;
        document.getElementById("candidateLabel").innerHTML =
          `${getTotalWordCount()}th word candidates (${count} / ${expected} possible)`;
        document.getElementById("filledCount").innerText =
          slots.filter(Boolean).length;
      }

      function renderPool() {
        const poolDiv = document.getElementById("wordPool");
        const q = document
          .getElementById("searchInput")
          .value.toLowerCase()
          .trim();
        const catF = catFilter;
        const usage = {};
        slots.filter(Boolean).forEach((s) => {
          usage[s.index] = (usage[s.index] || 0) + 1;
        });
        let filtered = WORDLIST.reduce((acc, word, idx) => {
          const cat = getCategory(word);
          const matchCat = catF === "all" || cat === catF;
          const matchText =
            q === "" ||
            word.startsWith(q) ||
            (q.startsWith("#") && String(idx + 1).startsWith(q.slice(1)));
          if (matchCat && matchText) acc.push({ word, index: idx, cat });
          return acc;
        }, []);
        const PAGE = 50;
        const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE));
        if (poolPage >= totalPages) poolPage = 0;
        const slice = filtered.slice(poolPage * PAGE, (poolPage + 1) * PAGE);
        document.getElementById("resultCount").innerHTML =
          `<span>${filtered.length}</span> words · page ${poolPage + 1}/${totalPages}`;
        poolDiv.innerHTML = "";
        slice.forEach(({ word, index, cat }) => {
          const uses = usage[index] || 0;
          const chip = document.createElement("div");
          chip.className = "word-chip";
          chip.draggable = true;
          chip.dataset.wordIndex = index;
          chip.innerHTML = `<span class="chip-cat ${cat}">${cat === "other" ? "oth" : cat.slice(0, 3)}</span><span class="chip-idx">#${index + 1}</span><strong>${word}</strong>${uses ? `<span class="chip-use-count">x${uses}</span>` : ""}`;
          chip.addEventListener("dragstart", (e) => {
            dragWord = { word, index, bits: indexToBits(index) };
            e.currentTarget.classList.add("dragging");
            setTimeout(() => e.currentTarget.classList.remove("dragging"), 0);
          });
          poolDiv.appendChild(chip);
        });
        if (totalPages > 1) {
          const pagWrap = document.createElement("div");
          pagWrap.style.cssText =
            "width:100%;display:flex;gap:6px;padding:8px 4px;align-items:center;justify-content:center;flex-shrink:0;";

          const prevBtn = document.createElement("button");
          prevBtn.textContent = "<- prev";
          prevBtn.disabled = poolPage === 0;
          prevBtn.style.cssText = `font-family:monospace;font-size:10px;padding:4px 35px;border-radius:3px;cursor:pointer;border:1px solid ${poolPage === 0 ? "#1e2d3a" : "#00ff88"};background:transparent;color:${poolPage === 0 ? "#4a6070" : "#00ff88"};`;
          prevBtn.onclick = () => {
            poolPage--;
            renderPool();
          };

          const nextBtn = document.createElement("button");
          nextBtn.textContent = "next ->";
          nextBtn.disabled = poolPage >= totalPages - 1;
          nextBtn.style.cssText = `font-family:monospace;font-size:10px;padding:4px 35px;border-radius:3px;cursor:pointer;border:1px solid ${poolPage >= totalPages - 1 ? "#1e2d3a" : "#00ff88"};background:transparent;color:${poolPage >= totalPages - 1 ? "#4a6070" : "#00ff88"};`;
          nextBtn.onclick = () => {
            poolPage++;
            renderPool();
          };

          pagWrap.append(prevBtn, nextBtn);
          poolDiv.appendChild(pagWrap);
        }
      }

      function renderCandidates(candidates) {
        const row = document.getElementById("candidatesRow");
        const filledCount = slots.filter(Boolean).length;
        if (filledCount !== getFreeSlotCount()) {
          row.innerHTML = `<div class="empty-state">Fill all ${getFreeSlotCount()} slots to reveal checksum candidates</div>`;
          return;
        }
        if (!candidates.length) {
          row.innerHTML = `<div class="empty-state">No valid last word (edge case)</div>`;
          return;
        }
        row.innerHTML = "";

        candidates.forEach((c) => {
          const cat = getCategory(c.word);
          let catShort = cat === "other" ? "oth" : cat.slice(0, 3);

          const labelMap = {
            noun: "NOU",
            verb: "VER",
            adj: "ADJ",
            adverb: "ADV",
            specials: "SPE",
            preposition: "PRE",
            determiner: "DET",
            number: "NUM",
            plural: "PLU",
            verbpast: "VPA",
            verbpresent: "VPR",
          };
          catShort = labelMap[cat] || catShort.toUpperCase();

          const chip = document.createElement("div");
          chip.className = `candidate-chip active ${lastWord && lastWord.index === c.index ? "selected" : ""}`;
          chip.style.cssText = `
                  display: inline-flex;
                  align-items: center;
                  gap: 8px;
                  background: ${lastWord && lastWord.index === c.index ? "#2a5f6e" : "#1a2f38"};
                  padding: 6px 14px;
                  border-radius: 32px;
                  font-size: 13px;
                  cursor: pointer;
                  transition: all 0.1s ease;
                  border: 1px solid ${lastWord && lastWord.index === c.index ? "#8effc2" : "#2a4a55"};
                `;
          chip.innerHTML = `
                  <span class="chip-cat ${cat}" style="background:#0f1e24;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:bold;">${catShort}</span>
                  <span style="color:#7a9eaa;font-size:10px;">#${c.index + 1}</span>
                  <strong style="color:#e2f0e8;">${c.word}</strong>
                `;
          chip.addEventListener("click", () => {
            lastWord = c;
            updateAll();
          });
          row.appendChild(chip);
        });
      }

      function renderSlots() {
        const grid = document.getElementById("slotsGrid");
        grid.innerHTML = "";
        const freeN = getFreeSlotCount();
        for (let i = 0; i < freeN; i++) {
          const slotDiv = document.createElement("div");
          const s = slots[i];
          const isTyping = typingSlot === i;
          slotDiv.className = `slot ${s ? "filled" : ""} ${isTyping ? "typing" : ""}`;
          slotDiv.dataset.slotIndex = i;
          slotDiv.innerHTML = `<div class="slot-num">${i + 1}</div>`;
          if (isTyping) {
            const wrap = document.createElement("div");
            wrap.style.position = "relative";
            const inp = document.createElement("input");
            inp.className = "slot-inline-input";
            inp.placeholder = "type word...";
            inp.autocomplete = "off";
            if (s) inp.value = s.word;
            const dd = document.createElement("div");
            dd.className = "ac-dropdown";
            dd.style.display = "none";
            let acItems = [],
              acIdx = -1;
            const updateDropdown = (query) => {
              dd.innerHTML = "";
              acItems = [];
              acIdx = -1;
              if (!query) {
                dd.style.display = "none";
                return;
              }
              const matches = WORDLIST.reduce((acc, w, wi) => {
                if (w.startsWith(query.toLowerCase()))
                  acc.push({ word: w, index: wi });
                return acc;
              }, []).slice(0, 12);
              if (!matches.length) {
                dd.style.display = "none";
                return;
              }
              matches.forEach(({ word, index }, mi) => {
                const cat = getCategory(word);
                const item = document.createElement("div");
                item.className = "ac-item";
                item.dataset.mi = mi;
                item.innerHTML = `<span class="ac-item-idx">#${index + 1}</span><span>${word}</span><span class="chip-cat ${cat}">${cat.slice(0, 3)}</span>`;
                item.addEventListener("mousedown", (e) => {
                  e.preventDefault();
                  placeWordInSlot(i, { word, index, bits: indexToBits(index) });
                });
                dd.appendChild(item);
                acItems.push({ word, index });
              });
              dd.style.display = "block";
            };
            inp.addEventListener("input", () => updateDropdown(inp.value));
            inp.addEventListener("keydown", (e) => {
              const items = dd.querySelectorAll(".ac-item");
              if (e.key === "ArrowDown") {
                e.preventDefault();
                acIdx = Math.min(acIdx + 1, items.length - 1);
                items.forEach((el, mi) =>
                  el.classList.toggle("ac-selected", mi === acIdx),
                );
              } else if (e.key === "ArrowUp") {
                e.preventDefault();
                acIdx = Math.max(acIdx - 1, 0);
                items.forEach((el, mi) =>
                  el.classList.toggle("ac-selected", mi === acIdx),
                );
              } else if (e.key === "Enter") {
                e.preventDefault();
                if (acIdx >= 0 && acItems[acIdx])
                  placeWordInSlot(i, acItems[acIdx]);
                else if (acItems.length === 1) placeWordInSlot(i, acItems[0]);
              } else if (e.key === "Escape") {
                typingSlot = null;
                updateAll();
              }
            });
            inp.addEventListener("blur", () =>
              setTimeout(() => {
                if (typingSlot === i) {
                  typingSlot = null;
                  updateAll();
                }
              }, 150),
            );
            wrap.append(inp, dd);
            slotDiv.appendChild(wrap);
            setTimeout(() => {
              inp.focus();
              if (s) updateDropdown(s.word);
            }, 10);
          } else if (s) {
            const cat = getCategory(s.word);
            slotDiv.innerHTML += `<div class="slot-cat-dot ${cat}"></div><div class="slot-word">${s.word}</div><div class="slot-bits">${s.bits}</div><div class="slot-remove" data-slot="${i}">✕</div>`;
            slotDiv.addEventListener("click", (e) => {
              if (!e.target.classList.contains("slot-remove")) {
                typingSlot = i;
                updateAll();
              }
            });
          } else {
            slotDiv.innerHTML += `<div class="slot-empty-hint">drop / type</div>`;
            slotDiv.addEventListener("click", () => {
              typingSlot = i;
              updateAll();
            });
          }
          slotDiv.addEventListener("dragover", (e) => e.preventDefault());
          slotDiv.addEventListener("drop", (e) => {
            e.preventDefault();
            if (dragWord) {
              placeWordInSlot(i, dragWord);
              dragWord = null;
            }
          });
          grid.appendChild(slotDiv);
        }
        document.querySelectorAll(".slot-remove").forEach((btn) =>
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            const idx = parseInt(btn.dataset.slot);
            slots[idx] = null;
            lastWord = null;
            typingSlot = null;
            updateAll();
          }),
        );
      }

      function placeWordInSlot(idx, wordObj) {
        slots[idx] = {
          word: wordObj.word,
          index: wordObj.index,
          bits: wordObj.bits ?? indexToBits(wordObj.index),
        };
        lastWord = null;
        typingSlot = null;
        updateAll();
      }

      function renderLastSlot() {
        const container = document.getElementById("lastSlot");
        const lastNum = getTotalWordCount();
        if (!lastWord) {
          container.innerHTML = `<div class="slot-num">${lastNum}</div><div class="slot-empty-hint">awaiting candidate click</div>`;
          container.className = "slot slot-24";
          return;
        }
        const cat = getCategory(lastWord.word);
        container.className = "slot slot-24 filled";
        container.innerHTML = `<div class="slot-num">${lastNum}</div><div class="slot-cat-dot ${cat}" style="position:absolute;right:8px;top:8px;"></div><div class="slot-word" style="color:#8effc2">${lastWord.word}</div><div class="slot-bits">${lastWord.bits}</div>`;
      }

      function renderBitStrip() {
        const strip = document.getElementById("bitStrip");
        strip.innerHTML = "";
        const free = getFreeSlotCount();
        for (let i = 0; i < free; i++) {
          const s = slots[i];
          const bits = s ? s.bits : "00000000000";
          const filled = !!s;
          for (let b = 0; b < 11; b++) {
            const bitDiv = document.createElement("div");
            bitDiv.className =
              "bit" + (filled ? (bits[b] === "1" ? " b1" : " b0") : "");
            bitDiv.textContent = "";
            strip.appendChild(bitDiv);
          }
          if (i < free - 1) {
            const sep = document.createElement("div");
            sep.className = "bit-group-sep";
            strip.appendChild(sep);
          }
        }
      }

      function renderProgress() {
        const filled = slots.filter(Boolean).length;
        const total = getFreeSlotCount();
        document.getElementById("progressFill").style.width =
          `${(filled / total) * 100}%`;
      }

      function renderOutput() {
        const outDiv = document.getElementById("seedOutput");
        if (!lastWord) {
          document.getElementById("outputSection").classList.remove("visible");
          outDiv.innerHTML = "";
          return;
        }
        document.getElementById("outputSection").classList.add("visible");
        const allWords = [...slots, lastWord];
        outDiv.innerHTML = allWords
          .map(
            (s, i) =>
              `<span class="seed-word"><span class="sw-num">${i + 1}.</span><span class="sw-word">${s ? s.word : "???"}</span></span>`,
          )
          .join(" ");
      }

      async function updateAll() {
        const candidates = await computeLastWordCandidates();
        renderRhythmBar();
        renderPool();
        renderSlots();
        renderLastSlot();
        renderBitStrip();
        renderProgress();
        renderCandidates(candidates);
        renderOutput();
        updateUILabels(candidates);
      }

      function initMode(mode) {
        currentMode = mode;
        dragWord = null;
        resetSlots();
        lastWord = null;
        typingSlot = null;
        poolPage = 0;
        updateAll();
      }

      const categories = [
        "all",
        "noun",
        "verb",
        "adj",
        "adverb",
        "specials",
        "determiner",
        "preposition",
        "number",
        "plural",
        "verbpast",
        "verbpresent",
        "other",
      ];
      function buildCatTabs() {
        const container = document.getElementById("catTabsContainer");
        container.innerHTML = "";
        categories.forEach((cat) => {
          const tab = document.createElement("div");
          tab.className = `cat-tab ${catFilter === cat ? "active" : ""}`;
          tab.dataset.cat = cat;
          tab.innerText =
            cat === "verbpast"
              ? "verb(past)"
              : cat === "verbpresent"
                ? "verb(present)"
                : cat.charAt(0).toUpperCase() + cat.slice(1);
          tab.addEventListener("click", () => {
            catFilter = cat;
            poolPage = 0;
            document
              .querySelectorAll(".cat-tab")
              .forEach((t) => t.classList.remove("active"));
            tab.classList.add("active");
            renderPool();
          });
          container.appendChild(tab);
        });
      }

      async function copyToClipboard(text) {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(text);

          return true;
        }

        const ta = document.createElement("textarea");

        Object.assign(ta.style, { position: "fixed", opacity: "0", top: "0" });

        ta.value = text;

        document.body.appendChild(ta);

        ta.select();

        document.execCommand("copy");

        document.body.removeChild(ta);

        return true;
      }
      document.querySelectorAll(".mode-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".mode-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          const mode = btn.dataset.mode;
          initMode(mode);
        });
      });

      document.getElementById("resetBtn").addEventListener("click", () => {
        resetSlots();
        lastWord = null;
        typingSlot = null;
        updateAll();
      });

      document.getElementById("searchInput").addEventListener("input", () => {
        poolPage = 0;
        renderPool();
      });
      document.getElementById("copyBtn").addEventListener("click", async () => {
        if (!lastWord) return;
        const phrase = [...slots, lastWord].map((s) => s.word).join(" ");
        try {
          await copyToClipboard(phrase);
          const btn = document.getElementById("copyBtn");
          btn.textContent = "Copied!";
          setTimeout(() => (btn.textContent = "Copy Seed"), 1200);
        } catch (e) {
          alert("Copy failed, select the phrase manually");
        }
      });

      buildCatTabs();
      resetSlots();
      updateAll();
    </script>
  </body>
</html>
